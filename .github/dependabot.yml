version: 2
updates:
  # Gradle dependencies and wrapper
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
    groups:
      fabric:
        patterns:
          - "fabric-loom"
          - "net.fabricmc:*"
          - "net.fabricmc.fabric-api:*"
      minecraft:
        patterns:
          - "com.mojang:minecraft"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
