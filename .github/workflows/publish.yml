name: Publish

# Builds the mod and publishes the jar to Modrinth.
#
# One-time repo setup (Settings → Secrets and variables → Actions):
#   secret  MODRINTH_TOKEN       — a Modrinth PAT with the "Create versions" scope
#   secret  MODRINTH_PROJECT_ID  — the Modrinth project id or slug
#
# Triggers on a published GitHub Release (recommended) or a manual run.
# mc-publish reads the version, loaders and dependencies (fabric-api) from the
# built jar's fabric.mod.json. NOTE: if Modrinth doesn't yet list game version
# 26.1.2, add it on the project first or adjust `game-versions` below.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version-type:
        description: Modrinth version type for manual publishes.
        type: choice
        options:
          - beta
          - alpha
          - release
        default: beta
      version:
        description: Optional Modrinth version number. Defaults to mod_version for releases, otherwise mod_version-type.run_number.
        required: false
        type: string
      changelog:
        description: Optional Modrinth changelog for manual publishes. Falls back to CHANGELOG.md.
        required: false
        type: string

permissions:
  contents: write

# Run JavaScript actions on Node 24 (Node 20 is deprecated on the runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  modrinth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Resolve publish metadata
        id: publish-meta
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          MANUAL_VERSION: ${{ inputs.version }}
          MANUAL_VERSION_TYPE: ${{ inputs['version-type'] }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${GITHUB_REF_NAME}"
            name="${RELEASE_NAME:-Grounds Connect ${GITHUB_REF_NAME}}"
          else
            base_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
            version_type="${MANUAL_VERSION_TYPE:-beta}"

            if [ -n "$MANUAL_VERSION" ]; then
              version="$MANUAL_VERSION"
            elif [ "$version_type" = "release" ]; then
              version="$base_version"
            else
              version="${base_version}-${version_type}.${GITHUB_RUN_NUMBER}"
            fi

            name="Grounds Connect ${version}"
          fi

          {
            echo "version=${version}"
            echo "name=${name}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Modrinth changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          MANUAL_CHANGELOG: ${{ inputs.changelog }}
        run: |
          if [ -n "$RELEASE_BODY" ]; then
            printf '%s\n' "$RELEASE_BODY" > .modrinth-changelog.md
          elif [ -n "$MANUAL_CHANGELOG" ]; then
            printf '%s\n' "$MANUAL_CHANGELOG" > .modrinth-changelog.md
          else
            cp CHANGELOG.md .modrinth-changelog.md
          fi

      - name: Attach jar to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/grounds-connect-*.jar

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/grounds-connect-*.jar
          name: ${{ steps.publish-meta.outputs.name }}
          version: ${{ steps.publish-meta.outputs.version }}
          version-type: ${{ github.event_name == 'workflow_dispatch' && inputs['version-type'] || 'release' }}
          changelog-file: .modrinth-changelog.md
          loaders: fabric
          game-versions: "26.1.2"
